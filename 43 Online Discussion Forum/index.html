<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkSphere - Discussion Forum</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <h2 class="logo">💬 TalkSphere</h2>
</nav>

<section class="hero">
    <h1>Join the Conversation</h1>
    <p>Ask questions, share ideas, and connect with others.</p>
</section>

<section class="forum">

    <!-- Create Post -->
    <div class="post-box">
        <h2>Create Discussion</h2>
        <input type="text" id="username" placeholder="Your name">
        <textarea id="postText" placeholder="Start a discussion..."></textarea>
        <button onclick="addPost()">Post</button>
    </div>

    <!-- Feed -->
    <div class="feed">
        <h2>Community Feed</h2>
        <div id="postList"></div>
    </div>

</section>



<script src="script.js"></script>
</body>
</html>
