<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Image Compressor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🖼️ Image Compressor</h1>
    <p>Compress your images instantly without losing quality</p>

    <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" hidden>
        <p>Drag & Drop Image Here</p>
        <button onclick="document.getElementById('fileInput').click()">Choose Image</button>
    </div>

    <div class="preview-section">
        <div class="image-box">
            <h3>Original</h3>
            <img id="originalPreview">
            <p id="originalSize"></p>
        </div>

        <div class="image-box">
            <h3>Compressed</h3>
            <img id="compressedPreview">
            <p id="compressedSize"></p>
            <a id="downloadBtn" download="compressed.jpg">Download</a>
        </div>
    </div>

    <div class="quality-control">
        <label>Compression Quality (0.1 - 1.0)</label>
        <input type="range" id="qualityRange" min="0.1" max="1" step="0.1" value="0.7">
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
